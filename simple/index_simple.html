<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decaf Search Simple</title>
    <link rel="stylesheet" href="styles_simple.css" />
  </head>
  <body>
    <!-- ページ全体を入れる大きな箱です -->
    <main class="page">
      <!-- ここにサイトのタイトルと説明を書きます -->
      <header class="hero">
        <p class="logo">Decaf Search</p>
        <h1>デカフェコーヒーを条件で探す</h1>
        <p>
          下の条件ボタンを押すと条件に合うものだけが表示されます。
        </p>
      </header>

      <!-- 条件メニューを開くボタンです -->
      <button id="open-menu-button" class="menu-button" type="button" aria-controls="filter-menu" aria-expanded="false">
        ☰ 条件で探す
      </button>

      <!-- メニューが開いている時に、背景を暗くするための箱です -->
      <div id="menu-overlay" class="menu-overlay"></div>

      <!-- ここに条件ボタンを表示します -->
      <section id="filter-menu" class="filter-area" aria-labelledby="filter-title">
        <div class="section-title">
          <h2 id="filter-title">条件で探す</h2>
          <button id="close-menu-button" class="close-button" type="button" aria-label="条件メニューを閉じる">
            ×
          </button>
        </div>

        <div class="section-title">
          <button id="show-all-button" class="reset-button" type="button">
            すべて表示
          </button>
        </div>

        <!-- JavaScriptがこの中に条件ボタンを作ります -->
        <div id="filter-buttons"></div>
      </section>

      <!-- ここに検索結果の件数を表示します -->
      <p id="result-count" class="result-count">読み込み中...</p>

      <!-- ここに商品一覧を表示します -->
      <section id="product-list" class="product-list" aria-label="商品一覧"></section>
    </main>

    <script src="app_simple.js"></script>
  </body>
</html>
